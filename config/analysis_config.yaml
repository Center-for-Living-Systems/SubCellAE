device: cuda   # or cpu

model:
  checkpoint_path: /mnt/d/lding/CLS_GitHub/fa_patch_AE_clustering/results/pax_wholecell_correctloader_ch1_ps32_latdim_8_20251203_2323/model.pth
  params:
    latent_dim: 8

dataset:
  csv_folder: /mnt/d/lding/FA/data
  csv_filename: patches.csv

dataloader:
  batch_size: 64
  num_workers: 4

out_dir: /mnt/d/lding/CLS_GitHub/fa_patch_AE_clustering/results/analysis_output

label_csv: /mnt/d/lding/FA/analysis_results/labelling/batch2_combined_labels.csv  # remove to skip steps 4-8

latent_source: mu   # mu or z (VAE); ignored for plain AE

embedding:
  methods:
    - UMAP
    # - PHATE   # uncomment to also run PHATE
  umap:
    n_neighbors: 15
    min_dist: 0.1
  phate:
    k: 5

clustering:
  kmeans:
    enabled: true
    n_clusters: 6
  dbscan:
    enabled: false
    eps: 0.5
    min_samples: 10
  boxplot_kind: box   # box or violin

# Optional: fix label order for plots. If omitted, inferred alphabetically from data.
label_orders:
  classification:
    - Nascent Adhesion
    - focal complex
    - focal adhesion
    - fibrillar adhesion
    - No adhesion
  position:
    - Cell Protruding Edge
    - Cell Periphery/other
    - Lamella
    - Cell Body
    - No Category/uncertain
